<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <rect width="400" height="120" rx="16" fill="#1c1830"/>
  <!-- Step 1: Describe -->
  <rect x="12" y="30" width="80" height="60" rx="10" fill="#342546"/>
  <text x="52" y="55" text-anchor="middle" font-family="system-ui" font-size="20">💬</text>
  <text x="52" y="76" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#f0eeff">Popiš</text>
  <!-- Arrow 1 -->
  <path d="M96 60 L116 60" stroke="#FFE233" stroke-width="2" stroke-linecap="round" marker-end="url(#arr)"/>
  <!-- Step 2: AI generates -->
  <rect x="120" y="30" width="80" height="60" rx="10" fill="#342546"/>
  <text x="160" y="55" text-anchor="middle" font-family="system-ui" font-size="20">🤖</text>
  <text x="160" y="76" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#f0eeff">AI tvoří</text>
  <!-- Arrow 2 -->
  <path d="M204 60 L224 60" stroke="#FFE233" stroke-width="2" stroke-linecap="round" marker-end="url(#arr)"/>
  <!-- Step 3: See result -->
  <rect x="228" y="30" width="80" height="60" rx="10" fill="#342546"/>
  <text x="268" y="55" text-anchor="middle" font-family="system-ui" font-size="20">👀</text>
  <text x="268" y="76" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#f0eeff">Vidíš</text>
  <!-- Arrow 3 -->
  <path d="M312 60 L332 60" stroke="#FFE233" stroke-width="2" stroke-linecap="round" marker-end="url(#arr)"/>
  <!-- Step 4: Refine -->
  <rect x="336" y="30" width="52" height="60" rx="10" fill="#342546"/>
  <text x="362" y="55" text-anchor="middle" font-family="system-ui" font-size="20">🔄</text>
  <text x="362" y="76" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#f0eeff">Uprav</text>
  <!-- Loop arrow back -->
  <path d="M362 92 Q362 108 268 108 Q52 108 52 92" stroke="#8a85aa" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arr2)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6" fill="none" stroke="#FFE233" stroke-width="1.5"/></marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6" fill="none" stroke="#8a85aa" stroke-width="1.5"/></marker>
  </defs>
</svg>
