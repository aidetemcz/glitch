<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" width="680" height="340" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#1C1917">Jak poznáme, jestli doporučení fungují?</text>
  <text x="340" y="42" text-anchor="middle" font-size="11" fill="#78716C">Tři způsoby testování, od rychlého po zlatý standard</text>

  <!-- Step 1: Offline -->
  <rect x="30" y="60" width="190" height="120" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="125" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563EB">1. Offline test</text>
  <text x="125" y="102" text-anchor="middle" font-size="9" fill="#78716C">Simuluj na starých datech</text>
  <text x="125" y="128" text-anchor="middle" font-size="22">💻</text>
  <text x="125" y="152" text-anchor="middle" font-size="9" fill="#2563EB" font-weight="600">Rychlé (minuty)</text>
  <text x="125" y="168" text-anchor="middle" font-size="8" fill="#78716C">Levné, opakovatelné, ale minulost ≠ budoucnost</text>

  <!-- Arrow -->
  <path d="M225,120 L250,120" fill="none" stroke="#78716C" stroke-width="1.5"/>
  <polygon points="250,116 258,120 250,124" fill="#78716C"/>

  <!-- Step 2. A/B test -->
  <rect x="260" y="60" width="180" height="120" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="350" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">2. A/B test</text>
  <text x="350" y="102" text-anchor="middle" font-size="9" fill="#78716C">Skuteční uživatelé, dvě skupiny</text>
  <g transform="translate(322, 108)">
    <rect x="0" y="0" width="24" height="28" rx="4" fill="#059669" fill-opacity="0.2" stroke="#059669"/>
    <text x="12" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#059669">A</text>
    <rect x="32" y="0" width="24" height="28" rx="4" fill="#7C3AED" fill-opacity="0.2" stroke="#7C3AED"/>
    <text x="44" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C3AED">B</text>
  </g>
  <text x="350" y="152" text-anchor="middle" font-size="9" fill="#059669" font-weight="600">Spolehlivé (dny)</text>
  <text x="350" y="168" text-anchor="middle" font-size="8" fill="#78716C">Zlatý standard — reálné chování</text>

  <!-- Arrow -->
  <path d="M445,120 L470,120" fill="none" stroke="#78716C" stroke-width="1.5"/>
  <polygon points="470,116 478,120 470,124" fill="#78716C"/>

  <!-- Step 3. Sledování -->
  <rect x="480" y="60" width="170" height="120" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="565" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#D97706">3. Sledování</text>
  <text x="565" y="102" text-anchor="middle" font-size="9" fill="#78716C">Sleduj v provozu</text>
  <text x="565" y="128" text-anchor="middle" font-size="22">📊</text>
  <text x="565" y="152" text-anchor="middle" font-size="9" fill="#D97706" font-weight="600">Stále zapnuté</text>
  <text x="565" y="168" text-anchor="middle" font-size="8" fill="#78716C">Zachyť problémy, upozornění při poklesu</text>

  <!-- What they measure -->
  <rect x="30" y="200" width="620" height="48" rx="8" fill="#F5F5F4" stroke="#E7E5E4"/>
  <text x="340" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#1C1917">Co všechny měří?</text>
  <text x="100" y="236" text-anchor="middle" font-size="9" fill="#2563EB">📈 Míra kliknutí</text>
  <text x="225" y="236" text-anchor="middle" font-size="9" fill="#059669">⏱ Čas sledování</text>
  <text x="355" y="236" text-anchor="middle" font-size="9" fill="#7C3AED">🔄 Opakované návštěvy</text>
  <text x="480" y="236" text-anchor="middle" font-size="9" fill="#D97706">🎯 Rozmanitost</text>
  <text x="600" y="236" text-anchor="middle" font-size="9" fill="#DC2626">😊 Spokojenost</text>

  <!-- Klíčový poznatek -->
  <rect x="130" y="268" width="420" height="55" rx="8" fill="#1C1917"/>
  <text x="340" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="white">Klíčový poznatek</text>
  <text x="340" y="308" text-anchor="middle" font-size="10" fill="#A8A29E">Nikdy nevěř jen jedné metrice. Více kliknutí může znamenat návykový</text>
  <text x="340" y="320" text-anchor="middle" font-size="10" fill="#A8A29E">design, ne lepší doporučení. Měř to, na čem záleží.</text>
</svg>
