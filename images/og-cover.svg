<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#7C3AED" stroke-width="2" rx="16" stroke-dasharray="8 4" opacity=".3"/>

  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="48" fill="#4C1D95" font-weight="bold">Jak funguje doporučování online?</text>
  <text x="600" y="260" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" fill="#7C3AED">Bezplatná interaktivní kniha pro věk 8-15 let</text>

  <!-- Subtitle -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#6B7280">Naučte se, jak algoritmy YouTube, TikTok &amp; Spotify rozhodují, co vidíte</text>
  <text x="600" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#6B7280">Hry, kvízy, mise &amp; 81 interaktivních sekcí</text>

  <!-- Author -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#A78BFA">od Pavla Kordíka (Recombee, FIT ČVUT v Praze)</text>

  <!-- Icons -->
  <text x="350" y="530" text-anchor="middle" font-size="32">&#128218;</text>
  <text x="350" y="560" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#7C3AED">6 kapitol</text>
  <text x="500" y="530" text-anchor="middle" font-size="32">&#127922;</text>
  <text x="500" y="560" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#7C3AED">8 her</text>
  <text x="650" y="530" text-anchor="middle" font-size="32">&#127942;</text>
  <text x="650" y="560" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#7C3AED">7 misí</text>
  <text x="800" y="530" text-anchor="middle" font-size="32">&#128640;</text>
  <text x="800" y="560" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#7C3AED">personalizované</text>

  <!-- Badge -->
  <rect x="470" y="470" width="260" height="30" rx="15" fill="#7C3AED" opacity=".1"/>
  <text x="600" y="491" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#7C3AED" font-weight="600">p-book | open source | CC BY-NC-SA</text>
</svg>
